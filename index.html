<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RAG-based Biden Speech Q&A Assistant</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
      background: #f9fafb;
    }

    .chat-wrapper {
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: white;
    }

    .chat-header {
      background: #1f2937;
      padding: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      border-bottom: 1px solid #374151;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .header-icon {
      width: 2.25rem;
      height: 2.25rem;
      border-radius: 50%;
      background: #dc2626;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 1.125rem;
    }

    .header-text h1 {
      color: white;
      font-size: 0.875rem;
      font-weight: 600;
      margin: 0;
    }

    .header-text p {
      color: #9ca3af;
      font-size: 0.75rem;
      margin: 0.125rem 0 0 0;
    }

    .download-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.375rem 0.75rem;
      background: rgba(255, 255, 255, 0.1);
      color: white;
      font-size: 0.75rem;
      font-weight: 500;
      border-radius: 0.375rem;
      border: none;
      cursor: pointer;
      transition: background 0.3s;
      text-decoration: none;
    }

    .download-btn:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .sample-questions {
      padding: 0.75rem;
      border-bottom: 1px solid #f3f4f6;
      display: flex;
      gap: 0.5rem;
      overflow-x: auto;
      flex-shrink: 0;
      background: #f9fafb;
    }

    .sample-questions::-webkit-scrollbar {
      height: 4px;
    }

    .sample-questions::-webkit-scrollbar-track {
      background: #e5e7eb;
    }

    .sample-questions::-webkit-scrollbar-thumb {
      background: #d1d5db;
      border-radius: 2px;
    }

    .sample-btn {
      white-space: nowrap;
      font-size: 0.75rem;
      padding: 0.375rem 0.75rem;
      background: white;
      border: 1px solid #e5e7eb;
      color: #4b5563;
      border-radius: 9999px;
      cursor: pointer;
      transition: all 0.3s;
      flex-shrink: 0;
    }

    .sample-btn:hover {
      border-color: #dc2626;
      color: #dc2626;
    }

    .sample-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .messages-container {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      background: white;
    }

    .messages-container::-webkit-scrollbar {
      width: 6px;
    }

    .messages-container::-webkit-scrollbar-track {
      background: #f3f4f6;
    }

    .messages-container::-webkit-scrollbar-thumb {
      background: #d1d5db;
      border-radius: 3px;
    }

    .message {
      display: flex;
      gap: 0.75rem;
      animation: slideIn 0.3s ease-out;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message.user {
      justify-content: flex-end;
    }

    .message-icon {
      width: 1.75rem;
      height: 1.75rem;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 0.875rem;
    }

    .message.assistant .message-icon {
      background: #dc2626;
      color: white;
    }

    .message.user .message-icon {
      background: #e5e7eb;
      color: #4b5563;
    }

    .message-content {
      max-width: 75%;
      padding: 0.625rem 1rem;
      border-radius: 0.5rem;
      font-size: 0.875rem;
      line-height: 1.5;
      word-wrap: break-word;
    }

    .message.assistant .message-content {
      background: #f3f4f6;
      color: #1f2937;
      border-radius: 0.5rem 0.5rem 0.5rem 0;
    }

    .message.user .message-content {
      background: #dc2626;
      color: white;
      border-radius: 0.5rem 0.5rem 0 0.5rem;
    }

    .loading-dots {
      display: flex;
      gap: 0.25rem;
      align-items: center;
    }

    .loading-dots span {
      width: 0.5rem;
      height: 0.5rem;
      background: #dc2626;
      border-radius: 50%;
      animation: bounce 1.4s infinite;
    }

    .loading-dots span:nth-child(2) {
      animation-delay: 0.2s;
    }

    .loading-dots span:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes bounce {
      0%, 80%, 100% {
        opacity: 0.3;
        transform: translateY(0);
      }
      40% {
        opacity: 1;
        transform: translateY(-8px);
      }
    }

    .input-area {
      padding: 0.75rem;
      border-top: 1px solid #e5e7eb;
      display: flex;
      gap: 0.75rem;
      flex-shrink: 0;
      background: white;
    }

    .input-field {
      flex: 1;
      padding: 0.625rem 1rem;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 9999px;
      font-size: 0.875rem;
      outline: none;
      transition: border-color 0.3s;
    }

    .input-field:focus {
      border-color: #dc2626;
    }

    .input-field::placeholder {
      color: #9ca3af;
    }

    .send-btn {
      width: 2.5rem;
      height: 2.5rem;
      background: #dc2626;
      color: white;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.3s;
      flex-shrink: 0;
      font-size: 1rem;
    }

    .send-btn:hover {
      background: #b91c1c;
    }

    .send-btn:disabled {
      background: #d1d5db;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <div class="chat-wrapper">
    <!-- Header -->
    <div class="chat-header">
      <div class="header-left">
        <div class="header-icon">🇺🇸</div>
        <div class="header-text">
          <h1>Biden Speech Q&A Assistant</h1>
          <p>Answers from 2023 State of the Union Address</p>
        </div>
      </div>
      <a href="https://www.kaggle.com/datasets/whegedusich/president-bidens-state-of-the-union-2023/data" target="_blank" class="download-btn">
        📊 View Dataset
      </a>
    </div>

    <!-- Sample Questions -->
    <div class="sample-questions" id="sampleQuestionsContainer">
      <button class="sample-btn" onclick="askQuestion('What did President Biden say about the economy?')">What did President Biden say about the economy?</button>
      <button class="sample-btn" onclick="askQuestion('What were the key points about healthcare?')">What were the key points about healthcare?</button>
      <button class="sample-btn" onclick="askQuestion('What did Biden say about climate change?')">What did Biden say about climate change?</button>
      <button class="sample-btn" onclick="askQuestion('What were the foreign policy highlights?')">What were the foreign policy highlights?</button>
      <button class="sample-btn" onclick="askQuestion('What did Biden say about jobs and employment?')">What did Biden say about jobs and employment?</button>
    </div>

    <!-- Messages -->
    <div class="messages-container" id="messagesContainer">
      <div class="message assistant">
        <div class="message-icon">🇺🇸</div>
        <div class="message-content">
          Hi! I'm the Biden Speech Q&A Assistant. Ask me anything about President Biden's 2023 State of the Union Address. I can help you find information about economy, healthcare, foreign policy, and more!
        </div>
      </div>
    </div>

    <!-- Input Area -->
    <div class="input-area">
      <input 
        type="text" 
        class="input-field" 
        id="inputField" 
        placeholder="Ask a question about the speech..."
        onkeypress="handleKeyPress(event)"
      >
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">
        ➤
      </button>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://whtggoqezzijocarqavj.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndodGdnb3Flenppam9jYXJxYXZqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0NzE3NjcsImV4cCI6MjA5MTA0Nzc2N30.LXC_ceAOp3yKpi-WFU5gDdLbaMSkBTElrQTduEKBr64';

    let isLoading = false;

    function addMessage(text, isUser) {
      const container = document.getElementById('messagesContainer');
      const messageDiv = document.createElement('div');
      messageDiv.className = `message ${isUser ? 'user' : 'assistant'}`;
      
      const iconDiv = document.createElement('div');
      iconDiv.className = 'message-icon';
      iconDiv.textContent = isUser ? '👤' : '🇺🇸';
      
      const contentDiv = document.createElement('div');
      contentDiv.className = 'message-content';
      contentDiv.textContent = text;
      
      messageDiv.appendChild(iconDiv);
      messageDiv.appendChild(contentDiv);
      container.appendChild(messageDiv);
      container.scrollTop = container.scrollHeight;
    }

    function addLoadingMessage() {
      const container = document.getElementById('messagesContainer');
      const messageDiv = document.createElement('div');
      messageDiv.className = 'message assistant';
      messageDiv.id = 'loading-message';
      
      const iconDiv = document.createElement('div');
      iconDiv.className = 'message-icon';
      iconDiv.textContent = '🇺🇸';
      
      const contentDiv = document.createElement('div');
      contentDiv.className = 'message-content loading-dots';
      contentDiv.innerHTML = '<span></span><span></span><span></span>';
      
      messageDiv.appendChild(iconDiv);
      messageDiv.appendChild(contentDiv);
      container.appendChild(messageDiv);
      container.scrollTop = container.scrollHeight;
    }

    function removeLoadingMessage() {
      const loadingMsg = document.getElementById('loading-message');
      if (loadingMsg) {
        loadingMsg.remove();
      }
    }

    async function sendMessage() {
      const input = document.getElementById('inputField');
      const question = input.value.trim();
      
      if (!question || isLoading) return;
      
      isLoading = true;
      document.getElementById('sendBtn').disabled = true;
      
      addMessage(question, true);
      input.value = '';
      addLoadingMessage();

      try {
        const response = await fetch(`${SUPABASE_URL}/functions/v1/biden-rag`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
          },
          body: JSON.stringify({ question })
        });

        removeLoadingMessage();

        if (response.ok) {
          const data = await response.json();
          addMessage(data.answer || 'Unable to find an answer to your question.', false);
        } else {
          addMessage('Sorry, I encountered an error. Please try again.', false);
        }
      } catch (error) {
        removeLoadingMessage();
        addMessage('Unable to connect to the service. Please try again later.', false);
      } finally {
        isLoading = false;
        document.getElementById('sendBtn').disabled = false;
        input.focus();
      }
    }

    function askQuestion(question) {
      document.getElementById('inputField').value = question;
      sendMessage();
    }

    function handleKeyPress(event) {
      if (event.key === 'Enter' && !isLoading) {
        sendMessage();
      }
    }

    // Focus input on load
    window.addEventListener('load', () => {
      document.getElementById('inputField').focus();
    });
  </script>
</body>
</html>
